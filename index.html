<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Precios Smartphone, Tablet y PC</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --card-2: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --accent: #ff8a00;
      --accent-2: #ffe2b5;
      --danger: #e53935;
      --ok: #16a34a;
      --border: #d8e0ec;
      --input: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #fff7ed 0, var(--bg) 230px);
      color: var(--text);
      min-height: 100vh;
      padding: 7px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
    }

    header {
      background: linear-gradient(135deg, #ffffff, #fff3e0);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 7px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, .10);
    }

    h1 {
      margin: 0;
      font-size: 21px;
      letter-spacing: .3px;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 4px;
      font-size: 11px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    @media (min-width: 800px) {
      .grid {
        grid-template-columns: 370px 1fr;
      }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, .08);
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 14px;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 138, 0, .16);
    }

    .field {
      margin-bottom: 7px;
    }

    textarea {
      width: 100%;
      min-height: 58px;
      resize: vertical;
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .details {
      margin-top: 7px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px;
      color: var(--text);
      font-size: 12px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .details span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .percent-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .percent-box input {
      min-width: 0;
    }

    .percent-box button {
      white-space: nowrap;
      padding-left: 12px;
      padding-right: 12px;
      width: auto;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 10px;
      font-weight: 800;
      cursor: pointer;
      font-size: 12px;
      color: #111827;
      background: var(--accent);
      width: 100%;
    }

    button:active {
      transform: scale(.99);
    }

    .btn-secondary {
      background: #eef2f7;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-ok {
      background: var(--ok);
      color: #06120b;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 7px;
    }

    .searchbar {
      margin-bottom: 7px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 7px;
    }

    .tab {
      background: #eef2f7;
      color: var(--text);
      padding: 8px;
      font-size: 11px;
    }

    .tab.active {
      background: var(--accent);
      color: #111827;
    }

    .item {
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 7px;
      margin-bottom: 7px;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 7px;
      align-items: flex-start;
    }

    .model {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.2;
    }

    .brand {
      color: var(--accent);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 2px;
    }

    .type {
      font-size: 11px;
      color: #7c3d00;
      background: var(--accent-2);
      padding: 4px 7px;
      border-radius: 99px;
      font-weight: 900;
      white-space: nowrap;
    }

    .specs {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 6px;
    }

    .spec {
      background: #f8fafc;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 4px 7px;
      font-size: 11px;
      font-weight: 700;
    }

    .spec span {
      color: var(--muted);
      font-weight: 600;
    }

    .prices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 7px;
    }

    @media (min-width: 420px) {
      .prices {
        grid-template-columns: 1fr 1fr 1fr 1fr;
      }
    }

    .pricebox {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px;
    }

    .pricebox span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .pricebox strong {
      font-size: 15px;
    }

    .profit {
      color: var(--ok);
    }

    .warning {
      color: var(--accent-2);
      font-size: 12px;
      margin-top: 8px;
    }

    .item-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 7px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 14px 8px;
      border: 1px dashed var(--border);
      border-radius: 12px;
    }

    .hidden {
      display: none;
    }

    .small-note {
      color: var(--muted);
      font-size: 11px;
      margin-top: 8px;
      line-height: 1.35;
    }

    footer {
      color: var(--muted);
      text-align: center;
      font-size: 11px;
      padding: 10px 0 4px;
    }
  </style>

  <meta name="theme-color" content="#fff7ed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Precios" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="manifest" href="manifest.webmanifest" />

</head>
<body>
  <div class="app">
    <header>
      <h1>📱💻 Precios Smartphone, Tablet y PC</h1>
      <div class="subtitle">
        Marca, RAM, memoria, detalles y precios. Ordenado por marca.
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <h2 id="formTitle">Agregar modelo</h2>

        <input type="hidden" id="editId" />

        <div class="field">
          <label for="tipo">Tipo</label>
          <select id="tipo" onchange="toggleFields()">
            <option value="smartphone">SMARTPHONE</option>
            <option value="tablet">TABLET</option>
            <option value="pc">PC</option>
          </select>
        </div>

        <div class="field">
          <label for="marca">Marca</label>
          <select id="marca">
            <option value="">ESCOGER MARCA</option>
            <option value="APPLE">APPLE</option>
            <option value="SAMSUNG">SAMSUNG</option>
            <option value="XIAOMI">XIAOMI</option>
            <option value="POCO">POCO</option>
            <option value="REDMI">REDMI</option>
            <option value="INFINIX">INFINIX</option>
            <option value="TECNO">TECNO</option>
            <option value="HONOR">HONOR</option>
            <option value="HUAWEI">HUAWEI</option>
            <option value="MOTOROLA">MOTOROLA</option>
            <option value="NUBIA">NUBIA</option>
            <option value="ZTE">ZTE</option>
            <option value="OPPO">OPPO</option>
            <option value="VIVO">VIVO</option>
            <option value="REALME">REALME</option>
            <option value="LENOVO">LENOVO</option>
            <option value="HP">HP</option>
            <option value="DELL">DELL</option>
            <option value="ASUS">ASUS</option>
            <option value="ACER">ACER</option>
            <option value="OTRA">OTRA</option>
          </select>
        </div>

        <div class="field">
          <label for="modelo">Modelo</label>
          <input id="modelo" placeholder="EJ: A15 / IPAD 9 / ELITEBOOK" oninput="forceUppercaseInput(this)" />
        </div>

        <div class="row">
          <div class="field">
            <label for="ram">RAM</label>
            <select id="ram">
              <option value="">ESCOGER RAM</option>
              <option value="2GB">2GB</option>
              <option value="3GB">3GB</option>
              <option value="4GB">4GB</option>
              <option value="6GB">6GB</option>
              <option value="8GB">8GB</option>
              <option value="12GB">12GB</option>
              <option value="16GB">16GB</option>
              <option value="24GB">24GB</option>
              <option value="32GB">32GB</option>
              <option value="64GB">64GB</option>
            </select>
          </div>

          <div class="field">
            <label for="memoria">Memoria</label>
            <select id="memoria">
              <option value="">ESCOGER MEMORIA</option>
              <option value="32GB">32GB</option>
              <option value="64GB">64GB</option>
              <option value="128GB">128GB</option>
              <option value="256GB">256GB</option>
              <option value="512GB">512GB</option>
              <option value="1TB">1TB</option>
              <option value="2TB">2TB</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="detalles">Detalles</label>
          <textarea id="detalles" placeholder="COLOR, ESTADO, GARANTÍA, ACCESORIOS, DETALLES..." oninput="forceUppercaseInput(this)"></textarea>
        </div>

        <div class="field" id="campoCompra">
          <label for="precioCompra">Me sale</label>
          <input id="precioCompra" type="number" step="0.01" placeholder="OPCIONAL. EJ: 120" />
        </div>

        <div class="field">
          <label for="precioVenta" id="labelVenta">Vendo en</label>
          <input id="precioVenta" type="number" step="0.01" placeholder="OPCIONAL. EJ: 140" />

          <div class="percent-box" id="campoPorcentaje">
            <input id="porcentajeGanancia" type="number" step="0.01" placeholder="% ganancia. Ej: 15" />
            <button class="btn-secondary" type="button" onclick="calculateByPercent()">Calcular %</button>
          </div>
        </div>

        <button onclick="saveItem()">Guardar</button>

        <div class="actions">
          <button class="btn-secondary" onclick="clearForm()">Limpiar</button>
          <button class="btn-secondary" onclick="exportData()">Exportar</button>
        </div>

        <div class="actions">
          <button class="btn-ok" onclick="document.getElementById('importFile').click()">Importar</button>
          <button class="btn-danger" onclick="clearAll()">Borrar todo</button>
        </div>

        <input class="hidden" type="file" id="importFile" accept=".json" onchange="importData(event)" />
      </section>

      <section class="card">
        <div class="searchbar">
          <input id="search" placeholder="BUSCAR POR MODELO, MARCA, RAM O MEMORIA..." oninput="forceUppercaseInput(this); renderItems()" />
        </div>

        <div class="tabs">
          <button class="tab active" id="tabAll" onclick="setFilter('all')">Todo</button>
          <button class="tab" id="tabPhone" onclick="setFilter('smartphone')">Smartphones</button>
          <button class="tab" id="tabTablet" onclick="setFilter('tablet')">Tablets</button>
          <button class="tab" id="tabPc" onclick="setFilter('pc')">PC</button>
        </div>

        <div id="list"></div>
      </section>
    </div>

    <footer>
      Guardado local en este navegador. Haz respaldo con “Exportar”.
    </footer>
  </div>

  <script>
    const STORAGE_KEY = "precios_smartphone_pc_v1";
    let items = [];
    let currentFilter = "all";


    function forceUppercaseInput(element) {
      const start = element.selectionStart;
      const end = element.selectionEnd;
      element.value = element.value.toUpperCase();
      try {
        element.setSelectionRange(start, end);
      } catch (e) {}
    }

    function money(value) {
      if (value === null || value === undefined || value === "") return "Pendiente";
      const n = Number(value);
      if (Number.isNaN(n)) return "Pendiente";
      return "$" + n.toFixed(2);
    }

    function loadItems() {
      try {
        items = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        items = [];
      }
      renderItems();
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function toggleFields() {
      const tipo = document.getElementById("tipo").value;
      const campoCompra = document.getElementById("campoCompra");
      const campoPorcentaje = document.getElementById("campoPorcentaje");
      const labelVenta = document.getElementById("labelVenta");

      if (tipo === "pc" || tipo === "tablet") {
        campoCompra.classList.add("hidden");
        campoPorcentaje.classList.add("hidden");
        labelVenta.textContent = tipo === "pc" ? "Precio final PC" : "Precio final Tablet";
        document.getElementById("precioCompra").value = "";
        document.getElementById("porcentajeGanancia").value = "";
      } else {
        campoCompra.classList.remove("hidden");
        campoPorcentaje.classList.remove("hidden");
        labelVenta.textContent = "Vendo en";
      }
    }

    function calculateByPercent() {
      const tipo = document.getElementById("tipo").value;
      const compra = Number(document.getElementById("precioCompra").value);
      const porcentaje = Number(document.getElementById("porcentajeGanancia").value);

      if (tipo !== "smartphone") {
        alert("El cálculo por porcentaje solo aplica para smartphones.");
        return;
      }

      if (!compra || compra <= 0) {
        alert("Para calcular %, primero pon el precio que te sale a ti.");
        return;
      }

      if (porcentaje <= 0) {
        alert("Escribe el porcentaje de ganancia. Ejemplo: 15");
        return;
      }

      const precioVenta = compra + (compra * porcentaje / 100);
      document.getElementById("precioVenta").value = precioVenta.toFixed(2);
    }

    function saveItem() {
      const editId = document.getElementById("editId").value;
      const tipo = document.getElementById("tipo").value;
      const marca = document.getElementById("marca").value.trim().toUpperCase();
      const modelo = document.getElementById("modelo").value.trim().toUpperCase();
      const ram = document.getElementById("ram").value.trim().toUpperCase();
      const memoria = document.getElementById("memoria").value.trim().toUpperCase();
      const detalles = document.getElementById("detalles").value.trim().toUpperCase();
      const precioCompraRaw = document.getElementById("precioCompra").value;
      const precioVentaRaw = document.getElementById("precioVenta").value;
      const precioCompra = precioCompraRaw === "" ? null : Number(precioCompraRaw);
      const precioVenta = precioVentaRaw === "" ? null : Number(precioVentaRaw);

      if (!modelo) {
        alert("Escribe el modelo.");
        return;
      }

      const data = {
        id: editId || crypto.randomUUID(),
        tipo,
        marca,
        modelo,
        ram,
        memoria,
        detalles,
        precioCompra: tipo === "smartphone" ? precioCompra : null,
        precioVenta,
        updatedAt: new Date().toISOString()
      };

      if (editId) {
        items = items.map(item => item.id === editId ? data : item);
      } else {
        items.unshift(data);
      }

      persist();
      clearForm();
      renderItems();
    }

    function clearForm() {
      document.getElementById("editId").value = "";
      document.getElementById("formTitle").textContent = "Agregar modelo";
      document.getElementById("tipo").value = "smartphone";
      document.getElementById("marca").value = "";
      document.getElementById("modelo").value = "";
      document.getElementById("ram").value = "";
      document.getElementById("memoria").value = "";
      document.getElementById("detalles").value = "";
      document.getElementById("precioCompra").value = "";
      document.getElementById("precioVenta").value = "";
      document.getElementById("porcentajeGanancia").value = "";
      toggleFields();
    }

    function editItem(id) {
      const item = items.find(x => x.id === id);
      if (!item) return;

      document.getElementById("editId").value = item.id;
      document.getElementById("formTitle").textContent = "Editar modelo";
      document.getElementById("tipo").value = item.tipo;
      document.getElementById("marca").value = (item.marca || "").toUpperCase();
      document.getElementById("modelo").value = item.modelo;
      document.getElementById("ram").value = item.ram || "";
      document.getElementById("memoria").value = item.memoria || "";
      document.getElementById("detalles").value = item.detalles || "";
      document.getElementById("precioCompra").value = item.precioCompra ?? "";
      document.getElementById("precioVenta").value = item.precioVenta ?? "";
      document.getElementById("porcentajeGanancia").value = "";
      toggleFields();

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteItem(id) {
      const item = items.find(x => x.id === id);
      if (!item) return;

      if (confirm("¿Borrar " + item.modelo + "?")) {
        items = items.filter(x => x.id !== id);
        persist();
        renderItems();
      }
    }

    function setFilter(filter) {
      currentFilter = filter;

      document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
      if (filter === "all") document.getElementById("tabAll").classList.add("active");
      if (filter === "smartphone") document.getElementById("tabPhone").classList.add("active");
      if (filter === "tablet") document.getElementById("tabTablet").classList.add("active");
      if (filter === "pc") document.getElementById("tabPc").classList.add("active");

      renderItems();
    }

    function renderItems() {
      const list = document.getElementById("list");
      const q = document.getElementById("search").value.toLowerCase().trim();

      if (!q) {
        list.innerHTML = `<div class="empty">Escribe un modelo, marca, RAM o memoria para buscar.</div>`;
        return;
      }

      let filtered = items.filter(item => {
        const matchFilter = currentFilter === "all" || item.tipo === currentFilter;
        const searchable = `${item.marca || ""} ${item.modelo || ""} ${item.ram || ""} ${item.memoria || ""} ${item.detalles || ""}`.toLowerCase();
        const matchSearch = searchable.includes(q);
        return matchFilter && matchSearch;
      });

      filtered.sort((a, b) => {
        const marcaA = (a.marca || "Sin marca").toLowerCase();
        const marcaB = (b.marca || "Sin marca").toLowerCase();
        const modeloA = (a.modelo || "").toLowerCase();
        const modeloB = (b.modelo || "").toLowerCase();

        if (marcaA !== marcaB) return marcaA.localeCompare(marcaB);
        return modeloA.localeCompare(modeloB);
      });

      if (!filtered.length) {
        list.innerHTML = `<div class="empty">No se encontraron modelos.</div>`;
        return;
      }

      let lastBrand = "";

      list.innerHTML = filtered.map(item => {
        const isPhone = item.tipo === "smartphone";
        const isTablet = item.tipo === "tablet";
        const typeLabel = isPhone ? "SMARTPHONE" : isTablet ? "TABLET" : "PC";
        const brandName = item.marca || "Sin marca";
        const showBrandTitle = brandName !== lastBrand;
        lastBrand = brandName;

        const hasPhonePrices = isPhone && item.precioCompra !== null && item.precioCompra !== undefined && item.precioVenta !== null && item.precioVenta !== undefined;
        const profit = hasPhonePrices ? Number(item.precioVenta) - Number(item.precioCompra) : null;
        const warning = hasPhonePrices && (profit < 15 || profit > 20)
          ? `<div class="warning">⚠️ Ganancia fuera del rango sugerido de $15 a $20.</div>`
          : "";

        return `
          ${showBrandTitle ? `<div class="brand-group-title">${escapeHtml(brandName)}</div>` : ""}
          <div class="item">
            <div class="item-head">
              <div>
                <div class="model">${escapeHtml(item.modelo)}</div>
                <div class="specs">
                  ${item.ram ? `<div class="spec"><span>RAM:</span> ${escapeHtml(item.ram)}</div>` : ""}
                  ${item.memoria ? `<div class="spec"><span>Memoria:</span> ${escapeHtml(item.memoria)}</div>` : ""}
                </div>
              </div>
              <div class="type">${typeLabel}</div>
            </div>

            ${item.detalles ? `<div class="details"><span>Detalles:</span>${escapeHtml(item.detalles)}</div>` : ""}

            <div class="prices">
              ${isPhone ? `
                <div class="pricebox">
                  <span>Me sale a mí</span>
                  <strong>${money(item.precioCompra)}</strong>
                </div>
                <div class="pricebox">
                  <span>Vendo en</span>
                  <strong>${money(item.precioVenta)}</strong>
                </div>
                <div class="pricebox">
                  <span>Ganancia</span>
                  <strong class="profit">${money(profit)}</strong>
                </div>
                <div class="pricebox">
                  <span>Margen</span>
                  <strong>${hasPhonePrices && item.precioCompra > 0 ? ((profit / item.precioCompra) * 100).toFixed(1) + "%" : "Pendiente"}</strong>
                </div>
              ` : `
                <div class="pricebox">
                  <span>${isTablet ? "Precio final Tablet" : "Precio final PC"}</span>
                  <strong>${money(item.precioVenta)}</strong>
                </div>
                <div class="pricebox">
                  <span>Compra</span>
                  <strong>No aplica</strong>
                </div>
              `}
            </div>

            ${warning}

            <div class="item-actions">
              <button class="btn-secondary" onclick="editItem('${item.id}')">Editar</button>
              <button class="btn-danger" onclick="deleteItem('${item.id}')">Borrar</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function exportData() {
      const backup = {
        app: "Precios Smartphone, Tablet y PC",
        version: 1,
        exportedAt: new Date().toISOString(),
        items
      };

      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "respaldo-precios-smartphone-pc.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          const importedItems = Array.isArray(data) ? data : data.items;

          if (!Array.isArray(importedItems)) {
            throw new Error("Formato inválido.");
          }

          items = importedItems.map(item => ({
            id: item.id || crypto.randomUUID(),
            tipo: item.tipo === "pc" ? "pc" : item.tipo === "tablet" ? "tablet" : "smartphone",
            marca: String(item.marca || "").trim().toUpperCase(),
            modelo: String(item.modelo || "").trim().toUpperCase(),
            ram: String(item.ram || "").trim().toUpperCase(),
            memoria: String(item.memoria || "").trim().toUpperCase(),
            detalles: String(item.detalles || "").trim().toUpperCase(),
            precioCompra: item.tipo === "smartphone" && item.precioCompra !== null && item.precioCompra !== undefined && item.precioCompra !== "" ? Number(item.precioCompra) : null,
            precioVenta: item.precioVenta !== null && item.precioVenta !== undefined && item.precioVenta !== "" ? Number(item.precioVenta) : null,
            updatedAt: item.updatedAt || new Date().toISOString()
          })).filter(item => item.modelo);

          persist();
          renderItems();
          alert("Importación completada.");
        } catch (err) {
          alert("No se pudo importar el archivo. Motivo: " + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }

    function clearAll() {
      if (confirm("¿Seguro que quieres borrar todos los modelos?")) {
        items = [];
        persist();
        renderItems();
      }
    }

    loadItems();
    toggleFields();
  </script>
</body>
</html>
